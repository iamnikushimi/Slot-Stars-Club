<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — Slot Stars Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold2:#FFA500;--neon:#00FFCC;--red:#FF4455;--dark:#050510;--dark2:#0a0a1f;--dark3:#0f0f2e;--border:rgba(255,215,0,0.15);--muted:rgba(255,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,165,0,0.06),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,255,204,0.04),transparent 50%);pointer-events:none;}
nav{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(5,5,16,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.back-btn{padding:0.3rem 0.8rem;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

main{max-width:700px;margin:0 auto;padding:1.5rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;text-align:center;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem;}
.page-sub{text-align:center;font-size:0.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:1.5rem;}

/* Promo code input */
.promo-card{background:var(--dark2);border:1px solid var(--border);padding:1.2rem;margin-bottom:1.5rem;}
.promo-row{display:flex;gap:0.5rem;}
.promo-input{flex:1;padding:0.5rem 0.75rem;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);color:#fff;font-family:'Rajdhani',sans-serif;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;}
.promo-input:focus{outline:none;border-color:var(--gold);}
.promo-btn{padding:0.5rem 1.2rem;border:1px solid var(--gold);background:rgba(255,215,0,0.08);color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.promo-btn:hover{background:rgba(255,215,0,0.15);}
.promo-msg{padding:0.5rem;font-size:0.82rem;text-align:center;margin-top:0.5rem;display:none;}
.promo-msg.ok{display:block;color:var(--neon);border:1px solid rgba(0,255,204,0.2);background:rgba(0,255,204,0.05);}
.promo-msg.err{display:block;color:var(--red);border:1px solid rgba(255,68,85,0.2);background:rgba(255,68,85,0.05);}

/* Transaction list */
.tx-list{background:var(--dark2);border:1px solid var(--border);}
.tx-header{padding:0.8rem 1.2rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);border-bottom:1px solid var(--border);}
.tx-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.03);}
.tx-item:last-child{border:none;}
.tx-icon{font-size:1.1rem;width:1.6rem;text-align:center;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-desc{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:0.65rem;color:var(--muted);letter-spacing:0.5px;}
.tx-amount{font-family:'Bebas Neue',sans-serif;font-size:1rem;text-align:right;white-space:nowrap;}
.tx-amount.positive{color:var(--neon);}
.tx-amount.negative{color:var(--red);}
.tx-amount.neutral{color:var(--muted);}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:0.82rem;}

@media(max-width:480px){main{padding:1rem;}.tx-item{padding:0.5rem 0.8rem;}.tx-desc{font-size:0.78rem;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">★ SSC</a>
  <a class="back-btn" href="/play">← Lobby</a>
</nav>

<main>
  <div class="page-title">📋 History</div>
  <div class="page-sub">Your activity & promo codes</div>

  <div class="promo-card">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:2px;color:var(--gold);margin-bottom:0.5rem;">🎟️ Promo Code</div>
    <div class="promo-row">
      <input class="promo-input" id="promoCode" placeholder="Enter code..." maxlength="20">
      <button class="promo-btn" onclick="redeemPromo()">Redeem</button>
    </div>
    <div class="promo-msg" id="promoMsg"></div>
  </div>

  <div class="tx-list">
    <div class="tx-header">Recent Activity</div>
    <div id="txList"><div class="empty">Loading...</div></div>
  </div>
</main>

<script>
var TX_ICONS = {
  spin: '🎰', win: '💰', loss: '📉', promo: '🎟️', bonus: '🎡',
  referral: '🦋', admin: '⚙️', tournament: '🎪', deposit: '💳', jackpot: '👑'
};

function ago(d) {
  if (!d) return '';
  var s = Math.floor((Date.now() - new Date(d+'Z').getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function loadHistory() {
  try {
    var r = await fetch('/api/game/transactions');
    if (!r.ok) { window.location = '/'; return; }
    var d = await r.json();
    var el = document.getElementById('txList');

    // Combine transactions + spin history
    var items = [];

    // Add transactions
    (d.transactions || []).forEach(function(t) {
      items.push({
        type: t.type,
        desc: t.description || t.type,
        amount: t.amount,
        game: t.game,
        time: t.created_at,
        balance: t.balance_after
      });
    });

    // Add spin history as fallback
    (d.spinHistory || []).forEach(function(s) {
      var net = s.payout - s.bet;
      items.push({
        type: net > 0 ? 'win' : net === 0 ? 'push' : 'spin',
        desc: (net > 0 ? 'Won' : 'Played') + ' ' + (s.game || 'slots'),
        amount: net,
        game: s.game,
        time: s.created_at,
        balance: null
      });
    });

    // Sort by time descending
    items.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });

    if (!items.length) {
      el.innerHTML = '<div class="empty">No activity yet — start playing!</div>';
      return;
    }

    el.innerHTML = items.slice(0, 100).map(function(t) {
      var icon = TX_ICONS[t.type] || '📝';
      var amtClass = t.amount > 0 ? 'positive' : t.amount < 0 ? 'negative' : 'neutral';
      var amtStr = t.amount > 0 ? '+$' + (t.amount / 100).toFixed(2) : t.amount < 0 ? '-$' + (Math.abs(t.amount) / 100).toFixed(2) : '$0.00';

      return '<div class="tx-item">'
        + '<div class="tx-icon">' + icon + '</div>'
        + '<div class="tx-info"><div class="tx-desc">' + t.desc + '</div><div class="tx-meta">' + ago(t.time) + (t.game ? ' · ' + t.game : '') + '</div></div>'
        + '<div class="tx-amount ' + amtClass + '">' + amtStr + '</div></div>';
    }).join('');
  } catch(e) { console.error(e); }
}

async function redeemPromo() {
  var code = document.getElementById('promoCode').value.trim();
  if (!code) return;
  var msg = document.getElementById('promoMsg');
  try {
    var r = await fetch('/api/game/promo/redeem', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ code: code })
    });
    var d = await r.json();
    if (r.ok && d.success) {
      msg.className = 'promo-msg ok';
      msg.textContent = d.message;
      document.getElementById('promoCode').value = '';
      loadHistory();
    } else {
      msg.className = 'promo-msg err';
      msg.textContent = d.error || 'Failed';
    }
  } catch(e) { msg.className = 'promo-msg err'; msg.textContent = 'Error'; }
}

loadHistory();
</script>
</body>
</html>
