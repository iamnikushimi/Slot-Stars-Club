<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achievements — Slot Stars Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold2:#FFA500;--neon:#00FFCC;--red:#FF4455;--dark:#050510;--dark2:#0a0a1f;--dark3:#0f0f2e;--border:rgba(255,215,0,0.15);--muted:rgba(255,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,165,0,0.06),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,255,204,0.04),transparent 50%);pointer-events:none;}
nav{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(5,5,16,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.back-btn{padding:0.3rem 0.8rem;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all 0.2s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

main{max-width:700px;margin:0 auto;padding:1.5rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;text-align:center;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem;}
.page-sub{text-align:center;font-size:0.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:1.5rem;}

/* Progress bar */
.progress-wrap{background:var(--dark2);border:1px solid var(--border);padding:1rem 1.2rem;margin-bottom:1.5rem;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.5rem;}
.progress-count{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);}
.progress-xp{font-size:0.72rem;color:var(--neon);letter-spacing:1px;}
.progress-bar{height:8px;background:rgba(255,255,255,0.06);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--neon));transition:width 0.6s ease;}

/* Category label */
.cat-label{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 0.75rem;display:flex;align-items:center;gap:0.75rem;}
.cat-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}

/* Achievement grid */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem;}
.ach-card{background:var(--dark2);border:1px solid var(--border);padding:1rem;text-align:center;transition:all 0.2s;position:relative;overflow:hidden;}
.ach-card.locked{opacity:0.35;filter:grayscale(0.8);}
.ach-card.unlocked{border-color:rgba(255,215,0,0.3);}
.ach-card.unlocked::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,0.04),transparent);pointer-events:none;}
.ach-icon{font-size:2rem;margin-bottom:0.4rem;}
.ach-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);line-height:1.1;}
.ach-desc{font-size:0.68rem;color:var(--muted);margin-top:0.2rem;line-height:1.3;}
.ach-xp{font-size:0.62rem;letter-spacing:1px;color:var(--neon);margin-top:0.4rem;}
.ach-date{font-size:0.58rem;color:rgba(255,215,0,0.5);margin-top:0.2rem;}
.ach-lock{position:absolute;top:0.5rem;right:0.5rem;font-size:0.8rem;opacity:0.4;}
.ach-check{position:absolute;top:0.5rem;right:0.5rem;font-size:0.8rem;color:var(--neon);}

/* Live feed */
.feed-card{background:var(--dark2);border:1px solid var(--border);margin-top:2rem;}
.feed-header{padding:0.8rem 1.2rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--neon);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem;}
.feed-dot{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:0.4;}50%{opacity:1;}}
.feed-list{max-height:300px;overflow-y:auto;padding:0.5rem 0;}
.feed-item{display:flex;align-items:center;gap:0.7rem;padding:0.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.03);}
.feed-item:last-child{border:none;}
.feed-icon{font-size:1.2rem;flex-shrink:0;}
.feed-text{flex:1;font-size:0.82rem;line-height:1.3;}
.feed-text strong{color:var(--gold);}
.feed-time{font-size:0.62rem;color:var(--muted);white-space:nowrap;}
.feed-amt{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--neon);}
.empty{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.82rem;}

@media(max-width:480px){main{padding:1rem;}.ach-grid{grid-template-columns:repeat(2,1fr);gap:0.5rem;}.ach-card{padding:0.75rem;}.ach-icon{font-size:1.5rem;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">★ SSC</a>
  <a class="back-btn" href="/play">← Lobby</a>
</nav>

<main>
  <div class="page-title">🏆 Achievements</div>
  <div class="page-sub">Unlock trophies and earn bonus XP</div>

  <div class="progress-wrap">
    <div class="progress-top">
      <div class="progress-count"><span id="unlocked">0</span> / <span id="total">0</span> Unlocked</div>
      <div class="progress-xp">+<span id="xpEarned">0</span> XP earned</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="achContainer"></div>

  <div class="feed-card">
    <div class="feed-header"><div class="feed-dot"></div> Live Activity Feed</div>
    <div class="feed-list" id="feedList">
      <div class="empty">Loading...</div>
    </div>
  </div>
</main>

<script>
function ago(d) {
  if (!d) return '';
  var s = Math.floor((Date.now() - new Date(d+'Z').getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

var CAT_NAMES = {
  beginner: '🌱 Getting Started',
  social: '🦋 Social',
  volume: '⚔️ Volume',
  wins: '💰 Wins',
  jackpots: '👑 Jackpots',
  explorer: '🗺️ Explorer',
  levels: '⭐ Levels',
  special: '🦉 Special',
};

async function loadAchievements() {
  try {
    var r = await fetch('/api/game/achievements');
    if (!r.ok) { window.location = '/'; return; }
    var d = await r.json();

    document.getElementById('unlocked').textContent = d.unlocked;
    document.getElementById('total').textContent = d.total;
    document.getElementById('xpEarned').textContent = d.xpEarned;
    var pct = d.total > 0 ? Math.round((d.unlocked / d.total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';

    // Group by category
    var cats = {};
    var catOrder = [];
    d.achievements.forEach(function(a) {
      var cat = a.category || 'other';
      if (!cats[cat]) { cats[cat] = []; catOrder.push(cat); }
      cats[cat].push(a);
    });

    var html = '';
    catOrder.forEach(function(cat) {
      html += '<div class="cat-label">' + (CAT_NAMES[cat] || cat) + '</div>';
      html += '<div class="ach-grid">';
      cats[cat].forEach(function(a) {
        var cls = a.unlocked ? 'unlocked' : 'locked';
        html += '<div class="ach-card ' + cls + '">';
        if (a.unlocked) {
          html += '<div class="ach-check">✓</div>';
        } else {
          html += '<div class="ach-lock">🔒</div>';
        }
        html += '<div class="ach-icon">' + a.icon + '</div>';
        html += '<div class="ach-name">' + a.name + '</div>';
        html += '<div class="ach-desc">' + a.desc + '</div>';
        html += '<div class="ach-xp">+' + a.xp + ' XP</div>';
        if (a.unlocked_at) html += '<div class="ach-date">' + ago(a.unlocked_at) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    document.getElementById('achContainer').innerHTML = html;
  } catch(e) { console.error(e); }
}

var FEED_ICONS = {
  big_win: '💰',
  achievement: '🏆',
  tournament_win: '🎪',
  jackpot: '👑',
  level_up: '⭐',
  referral: '🦋',
};

async function loadFeed() {
  try {
    var r = await fetch('/api/game/live-feed');
    if (!r.ok) return;
    var d = await r.json();
    var list = document.getElementById('feedList');

    if (!d.events || !d.events.length) {
      list.innerHTML = '<div class="empty">No activity yet — start playing!</div>';
      return;
    }

    list.innerHTML = d.events.map(function(e) {
      var icon = FEED_ICONS[e.event_type] || '🎰';
      var text = '';
      if (e.event_type === 'big_win') {
        text = '<strong>' + e.username + '</strong> hit a ' + (e.detail || 'BIG WIN') + ' on ' + (e.game || 'slots');
      } else if (e.event_type === 'achievement') {
        text = '<strong>' + e.username + '</strong> unlocked <strong>' + e.detail + '</strong>';
      } else if (e.event_type === 'tournament_win') {
        text = '<strong>' + e.username + '</strong> won <strong>' + e.detail + '</strong>';
      } else {
        text = '<strong>' + e.username + '</strong> ' + e.detail;
      }
      var amt = e.amount > 0 ? '<div class="feed-amt">$' + e.amount.toFixed(2) + '</div>' : '';
      return '<div class="feed-item"><div class="feed-icon">' + icon + '</div><div class="feed-text">' + text + '</div>' + amt + '<div class="feed-time">' + ago(e.created_at) + '</div></div>';
    }).join('');
  } catch(e) {}
}

loadAchievements();
loadFeed();
setInterval(loadFeed, 30000);
</script>
</body>
</html>
