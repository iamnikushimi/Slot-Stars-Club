  /* Potential win display */

  @media(max-width:480px){

    .credits-label{display:none;}
    .crash-panel{padding:1rem;}
    .crash-screen{height:200px;}
    .mult-display{font-size:3rem;}
    .controls{grid-template-columns:1fr 1fr;}
    .launch-btn,.cashout-btn{font-size:1.3rem;padding:0.8rem;}
    .result-amount{font-size:1.6rem;}

/* XP Popup */
.xp-float{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:#00FFCC;text-shadow:0 0 12px rgba(0,255,204,0.5);pointer-events:none;z-index:200;opacity:0;animation:xpFloatUp 1.2s ease-out forwards;}
@keyframes xpFloatUp{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}20%{opacity:1;transform:translate(-50%,-60%) scale(1.1);}100%{opacity:0;transform:translate(-50%,-120%) scale(0.8);}}
.levelup-overlay{position:fixed;inset:0;z-index:250;background:rgba(5,5,16,0.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.levelup-overlay.show{opacity:1;pointer-events:auto;}
.levelup-box{text-align:center;animation:levelPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes levelPop{0%{transform:scale(0);}100%{transform:scale(1);}}
.levelup-box .lu-stars{font-size:2rem;margin-bottom:0.3rem;}
.levelup-box .lu-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;background:linear-gradient(135deg,#00FFCC,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.levelup-box .lu-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:#00FFCC;line-height:1;text-shadow:0 0 30px rgba(0,255,204,0.4);}

<body>

<main>
  <div class="crash-panel">
    <div class="crash-screen" id="crashScreen">
      <canvas id="crashCanvas"></canvas>
      <div class="status-bar" id="statusBar">READY</div>
      <div class="mult-display" id="multDisplay">1.00×</div>
      <div class="rocket" id="rocket">🚀</div>
      <!-- Result banner slides up from bottom — no overlap with multiplier -->

        <div class="result-amount" id="resultAmount"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <div class="control-label">Bet Amount</div>
        <input class="control-input" type="number" id="betInput" value="1.00" step="0.10" min="0.10">
        <div class="input-hint">Min $0.10</div>
      </div>
      <div class="control-group">
        <div class="control-label">Auto Cash Out At</div>
        <input class="control-input" type="number" id="cashoutInput" value="0" step="0.10" min="0" placeholder="Off">
        <div class="input-hint">0 = manual only</div>
      </div>
    </div>

    <div class="bet-presets" id="betPresets">
      <button class="bet-preset" onclick="setBet(0.10)">$0.10</button>
      <button class="bet-preset" onclick="setBet(0.50)">$0.50</button>
      <button class="bet-preset" onclick="setBet(1)">$1</button>
      <button class="bet-preset" onclick="setBet(5)">$5</button>
      <button class="bet-preset" onclick="setBet(10)">$10</button>
      <button class="bet-preset" onclick="setBet(50)">$50</button>
    </div>

    <div class="potential-win" id="potentialWin"></div>

    <div class="btn-row">
      <button class="launch-btn" id="launchBtn" onclick="placeBet()">🚀 LAUNCH</button>
      <button class="cashout-btn" id="cashoutBtn" onclick="manualCashout()">
        💰 CASH OUT
        <span class="cashout-mult" id="cashoutMult"></span>
      </button>
    </div>
  </div>

  <div class="history-strip">
    <div class="history-label">Recent Rounds</div>
    <div class="history-pills" id="historyPills"><span style="color:rgba(255,255,255,0.2);font-size:0.85rem">No rounds yet</span></div>
  </div>
</main>

<script>
let credits = 0, minBet = 10, maxBet = 10000;
let animFrame, currentMult = 1.0, crashPoint, animRunning = false;
let points = [];
let gameState = 'idle'; // idle | flying | crashed | won
let serverData = null;
let betCents = 0;
let animInterval = null;
let checkInterval = null;
let startTime = 0;
let manualCashedOut = false;

let canvas, ctx;

function initCanvas() {
  try {
    canvas = document.getElementById('crashCanvas');
    if (!canvas) { console.error('No canvas element'); return; }
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  } catch(e) { console.error('Canvas init error:', e); }
}

function resizeCanvas() {
  if (!canvas || !ctx) return;
  const screen = document.getElementById('crashScreen');
  if (!screen || !screen.clientWidth) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = screen.clientWidth * dpr;
  canvas.height = screen.clientHeight * dpr;
  canvas.style.width = screen.clientWidth + 'px';
  canvas.style.height = screen.clientHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawGraph();
}

function drawGraph() {
  if (!canvas || !ctx) return;
  const W = canvas.width / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  if (W < 1 || H < 1) return;
  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,68,85,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++) {
    const y = H - (i / 5) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  if (points.length < 2) return;

  const pad = 15;
  const maxT = points[points.length-1].t;
  const maxM = Math.max(...points.map(p => p.m), 2.0);

  function toX(t) { return pad + (t / maxT) * (W - pad*2); }
  function toY(m) { return H - pad - ((m - 1) / (maxM - 1 || 1)) * (H - pad*2); }

  // Glow fill under curve
  ctx.beginPath();
  ctx.moveTo(toX(0), H - pad);
  points.forEach(p => ctx.lineTo(toX(p.t), toY(p.m)));
  ctx.lineTo(toX(points[points.length-1].t), H - pad);
  ctx.closePath();
  const fillAlpha = gameState === 'crashed' ? 0.08 : 0.05;
  const fillColor = gameState === 'won' ? 'rgba(0,255,204,' : 'rgba(255,68,85,';
  ctx.fillStyle = fillColor + fillAlpha + ')';
  ctx.fill();

  // Main line
  ctx.beginPath();
  ctx.moveTo(toX(points[0].t), toY(points[0].m));
  points.forEach(p => ctx.lineTo(toX(p.t), toY(p.m)));
  if (gameState === 'won') {
    ctx.strokeStyle = '#00FFCC';
  } else if (gameState === 'crashed') {
    ctx.strokeStyle = 'rgba(255,68,85,0.5)';
  } else {
    ctx.strokeStyle = '#FF4455';
  }
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Glow on the line
  if (animRunning) {
    ctx.strokeStyle = 'rgba(255,68,85,0.2)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(toX(points[0].t), toY(points[0].m));
    points.forEach(p => ctx.lineTo(toX(p.t), toY(p.m)));
    ctx.stroke();
  }

  // Move rocket
  const last = points[points.length - 1];
  const rx = toX(last.t) - 16;
  const ry = toY(last.m) - 16;
  const rocket = document.getElementById('rocket');
  rocket.style.left = rx + 'px';
  rocket.style.bottom = (H - ry - 32) + 'px';

  // Multiplier axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '10px Rajdhani, sans-serif';
  ctx.textAlign = 'right';
  const step = maxM > 10 ? 5 : maxM > 5 ? 2 : 1;
  for (let m = 1 + step; m <= maxM; m += step) {
    const y = toY(m);
    if (y > 15 && y < H - 25) {
      ctx.fillText(m.toFixed(0) + '×', W - 5, y + 3);
    }
  }
}

async function loadUser() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location='/'; return; }
  const d = await res.json();
  credits = d.credits;
  updateCredits();
}

function updateCredits() {
  document.getElementById('credits').textContent = '$' + (credits/100).toFixed(2);
}

async function loadSettings() {
  try {
    const res = await fetch('/api/game/settings');
    if (!res.ok) return;
    const d = await res.json();
    minBet = d.minBet; maxBet = d.maxBet;
  } catch(e) {}
}

function setBet(val) {
  document.getElementById('betInput').value = val.toFixed(2);
  updatePotentialWin();
}

function updatePotentialWin() {
  const el = document.getElementById('potentialWin');
  if (gameState === 'flying') {
    const win = (betCents * currentMult / 100).toFixed(2);
    el.innerHTML = `Current value: <span class="amount">$${win}</span>`;
  } else {
    el.textContent = '';
  }
}

async function loadHistory() {
  try {
    const res = await fetch('/api/game/crash/history');
    const d = await res.json();
    renderHistory(d.history.map(h => parseFloat(h.point)));
  } catch(e) {}
}

function renderHistory(rounds) {
  const el = document.getElementById('historyPills');
  if (!rounds.length) return;
  el.innerHTML = rounds.map(r => {
    const cls = r < 2 ? 'low' : r < 5 ? 'mid' : 'high';
    return `<span class="history-pill ${cls}">${r.toFixed(2)}×</span>`;
  }).join('');
}

function setUIState(state) {
  gameState = state;
  const launchBtn = document.getElementById('launchBtn');
  const cashoutBtn = document.getElementById('cashoutBtn');
  const betInput = document.getElementById('betInput');
  const cashoutInput = document.getElementById('cashoutInput');
  const presets = document.querySelectorAll('.bet-preset');

  if (state === 'idle') {
    launchBtn.disabled = false;
    launchBtn.textContent = '🚀 LAUNCH';
    launchBtn.style.display = '';
    cashoutBtn.classList.remove('active');
    cashoutBtn.disabled = true;
    betInput.disabled = false;
    cashoutInput.disabled = false;
    presets.forEach(b => b.disabled = false);
  } else if (state === 'flying') {
    launchBtn.style.display = 'none';
    cashoutBtn.classList.add('active');
    cashoutBtn.disabled = false;
    betInput.disabled = true;
    cashoutInput.disabled = true;
    presets.forEach(b => b.disabled = true);
  } else if (state === 'crashed' || state === 'won') {
    launchBtn.disabled = true;
    launchBtn.style.display = '';
    launchBtn.textContent = state === 'crashed' ? '💥 CRASHED' : '✓ WON';
    cashoutBtn.classList.remove('active');
    cashoutBtn.disabled = true;
    betInput.disabled = true;
    cashoutInput.disabled = true;
    presets.forEach(b => b.disabled = true);
  }
}

function showResult(won, amount, detail) {
  const banner = document.getElementById('resultBanner');
  const amountEl = document.getElementById('resultAmount');
  const detailEl = document.getElementById('resultDetail');

  amountEl.textContent = amount;
  amountEl.className = 'result-amount ' + (won ? 'win' : 'lose');
  detailEl.textContent = detail;
  banner.className = 'result-banner show ' + (won ? 'win-result' : 'lose-result');
}

function hideResult() {
  document.getElementById('resultBanner').className = 'result-banner';
}

function manualCashout() {
  if (gameState !== 'flying' || !serverData) return;
  manualCashedOut = true;
  // The cash out is processed in the check interval
}

async function placeBet() {
  if (gameState !== 'idle') return;

  const betDollars = parseFloat(document.getElementById('betInput').value);
  const cashoutVal = parseFloat(document.getElementById('cashoutInput').value);
  betCents = Math.round(betDollars * 100);
  const autoCashout = cashoutVal >= 1.10 ? Math.round(cashoutVal * 100) : 0;

  if (isNaN(betCents) || betCents < minBet) { alert(`Min bet is $${(minBet/100).toFixed(2)}`); return; }
  if (betCents > maxBet) { alert(`Max bet is $${(maxBet/100).toFixed(2)}`); return; }
  if (credits < betCents) { alert('Insufficient balance'); return; }

  setUIState('flying');
  hideResult();
  manualCashedOut = false;

  // Reset
  points = [];
  animRunning = true;
  currentMult = 1.0;
  startTime = Date.now();
  document.getElementById('rocket').style.display = 'block';

  // Start climb animation
  animInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    currentMult = Math.pow(1.06, elapsed * 10);
    const displayMult = currentMult.toFixed(2);
    document.getElementById('multDisplay').textContent = displayMult + '×';
    document.getElementById('multDisplay').className = 'mult-display';
    document.getElementById('statusBar').textContent = 'FLYING — ' + displayMult + '×';
    document.getElementById('cashoutMult').textContent = displayMult + '× = $' + (betCents * currentMult / 100).toFixed(2);
    points.push({ t: elapsed, m: currentMult });
    drawGraph();
    updatePotentialWin();
  }, 50);

  // Send bet to server
  try {
    const res = await fetch('/api/game/crash/bet', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ bet: betCents, cashoutAt: autoCashout || 99999 })
    });
    serverData = await res.json();
    if (serverData.xp) showXPGain(serverData.xp);
    const serverCrash = parseFloat(serverData.crashPoint);

    // Check interval — watches for crash or manual cashout
    checkInterval = setInterval(() => {
      // Manual cash out
      if (manualCashedOut && gameState === 'flying') {
        clearInterval(animInterval);
        clearInterval(checkInterval);
        animRunning = false;
        const cashMult = currentMult;

        // If the player cashes out before the crash, they win
        if (cashMult < serverCrash) {
          const winAmount = Math.round(betCents * cashMult);
          credits = credits - betCents + winAmount;
          updateCredits();

          setUIState('won');
          document.getElementById('multDisplay').textContent = cashMult.toFixed(2) + '×';
          document.getElementById('multDisplay').className = 'mult-display win';
          document.getElementById('statusBar').textContent = '✓ CASHED OUT';
          showResult(true, '+$' + ((winAmount - betCents)/100).toFixed(2), 'Cashed out at ' + cashMult.toFixed(2) + '×');

          // Also tell server about manual cashout
          fetch('/api/game/crash/manual-cashout', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ bet: betCents, cashoutMult: cashMult })
          }).then(r=>r.json()).then(d=>{
            if (d.credits) { credits = d.credits; updateCredits(); }
          }).catch(()=>{});

        } else {
          // Crashed before they could actually cash out
          handleCrash(serverCrash);
        }
        loadHistory();
        scheduleReset();
        return;
      }

      // Auto cashout check
      if (autoCashout > 0 && currentMult >= autoCashout / 100 && gameState === 'flying') {
        clearInterval(animInterval);
        clearInterval(checkInterval);
        animRunning = false;

        if (serverData.won) {
          credits = serverData.credits;
          updateCredits();
          setUIState('won');
          const cashedAt = serverData.cashedOutAt || (autoCashout / 100).toFixed(2);
          document.getElementById('multDisplay').textContent = cashedAt + '×';
          document.getElementById('multDisplay').className = 'mult-display win';
          document.getElementById('statusBar').textContent = '✓ AUTO CASHED OUT';
          showResult(true, '+$' + (serverData.win/100).toFixed(2), 'Auto cashed out at ' + cashedAt + '×');
        } else {
          handleCrash(serverCrash);
        }
        loadHistory();
        scheduleReset();
        return;
      }

      // Crash check
      if (currentMult >= serverCrash) {
        clearInterval(animInterval);
        clearInterval(checkInterval);
        animRunning = false;
        handleCrash(serverCrash);
        loadHistory();
        scheduleReset();
      }
    }, 40);

  } catch(e) {
    console.error('Crash bet error:', e);
    if (animInterval) clearInterval(animInterval);
    if (checkInterval) clearInterval(checkInterval);
    animRunning = false;
    setUIState('idle');
  }
}

function handleCrash(serverCrash) {
  setUIState('crashed');
  credits = serverData.credits;
  updateCredits();
  document.getElementById('multDisplay').textContent = serverCrash.toFixed(2) + '×';
  document.getElementById('multDisplay').className = 'mult-display crashed';
  document.getElementById('statusBar').textContent = '💥 CRASHED';
  document.getElementById('rocket').style.display = 'none';
  showResult(false, '-$' + (betCents/100).toFixed(2), 'Crashed at ' + serverCrash.toFixed(2) + '×');
  document.getElementById('potentialWin').textContent = '';
}

function scheduleReset() {
  setTimeout(() => {
    document.getElementById('rocket').style.display = 'block';
    document.getElementById('rocket').style.left = '0px';
    document.getElementById('rocket').style.bottom = '0px';
    document.getElementById('multDisplay').textContent = '1.00×';
    document.getElementById('multDisplay').className = 'mult-display';
    document.getElementById('statusBar').textContent = 'READY';
    document.getElementById('potentialWin').textContent = '';
    points = [];
    currentMult = 1.0;
    drawGraph();
    hideResult();
    setUIState('idle');
    serverData = null;
  }, 3000);
}

async function logout() { await fetch('/api/auth/logout',{method:'POST'}); window.location='/'; }

// Init
initCanvas();
loadUser();
loadSettings();
loadHistory();
</script>

<div class="levelup-overlay" id="levelupOverlay" onclick="this.classList.remove('show')">
  <div class="levelup-box">
    <div class="lu-stars">✦ ✦ ✦</div>
    <div class="lu-text">LEVEL UP!</div>
    <div class="lu-num" id="luNum">2</div>
    <div class="lu-title" id="luTitle">Beginner</div>
    <div class="lu-reward" id="luReward">+$1.00 bonus credits</div>
  </div>
</div>
<script>
function showXPGain(xpData) {
  if (!xpData || !xpData.xpGained) return;
  var el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + xpData.xpGained + ' XP';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 1300);
  if (xpData.leveledUp) {
    setTimeout(function() {
      document.getElementById('luNum').textContent = xpData.level;
      document.getElementById('luTitle').textContent = xpData.title;
      document.getElementById('luReward').textContent = xpData.reward > 0 ? '+$' + (xpData.reward / 100).toFixed(2) + ' bonus credits!' : '';
      document.getElementById('levelupOverlay').classList.add('show');
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784, 1047, 1318].forEach(function(f, i) {
          var o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f; o.type = 'sine';
          var t = ctx.currentTime + i * 0.12;
          g.gain.setValueAtTime(0.12, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t); o.stop(t + 0.4);
        });
      } catch(e) {}
      setTimeout(function() { document.getElementById('levelupOverlay').classList.remove('show'); }, 3000);
    }, 800);
  }
}
</script>
