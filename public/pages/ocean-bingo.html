*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#020b1a;font-family:'Rajdhani',sans-serif;color:#fff;touch-action:none;user-select:none;}

/* ── HUD ── */
#hud{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
#topBar{pointer-events:all;display:flex;align-items:center;justify-content:space-between;padding:max(0.5rem,env(safe-area-inset-top)) 1rem 0.5rem;background:linear-gradient(to bottom,rgba(0,8,20,0.92) 0%,transparent 100%);}
.tb-logo{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:900;letter-spacing:3px;text-decoration:none;background:linear-gradient(135deg,#00d4ff,#00ffd4,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-center{display:flex;flex-direction:column;align-items:center;gap:0.1rem;}
.tb-bal-label{font-size:0.5rem;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.tb-bal{font-family:'Cinzel',serif;font-size:1.15rem;color:#00ffd4;letter-spacing:1px;}
.tb-btn{padding:0.3rem 0.8rem;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);background:transparent;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all 0.2s;}
.tb-btn:hover{border-color:rgba(0,212,255,0.5);color:#00d4ff;}

/* Jackpot pills */
#jpBanner{pointer-events:none;display:flex;gap:0.4rem;padding:0 1rem;margin-top:0.3rem;}
.jp-pill{flex:1;padding:0.28rem 0.4rem;text-align:center;border:1px solid;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);position:relative;overflow:hidden;}
.jp-pill::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);}
.jp-pill.mini{border-color:rgba(0,170,255,0.3);}
.jp-pill.major{border-color:rgba(0,255,170,0.4);}
.jp-pill.grand{border-color:rgba(255,215,0,0.5);animation:jpPulse 2.5s ease-in-out infinite;}
@keyframes jpPulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 16px rgba(255,215,0,0.3);}}
.jp-pill-name{font-size:0.45rem;letter-spacing:2px;text-transform:uppercase;display:block;}
.jp-pill.mini .jp-pill-name{color:rgba(0,170,255,0.7);}.jp-pill.major .jp-pill-name{color:rgba(0,255,170,0.8);}.jp-pill.grand .jp-pill-name{color:rgba(255,215,0,0.85);}
.jp-pill-amt{font-family:'Cinzel',serif;font-size:0.82rem;font-weight:700;display:block;}
.jp-pill.mini .jp-pill-amt{color:#00aaff;}.jp-pill.major .jp-pill-amt{color:#00ffd4;}.jp-pill.grand .jp-pill-amt{color:#ffd700;}

/* ── BINGO CARD (shown beside/below reels) ── */
#bingoCardWrap{pointer-events:none;position:fixed;right:0.5rem;top:50%;transform:translateY(-50%);z-index:12;opacity:0;transition:opacity 0.5s;}
#bingoCardWrap.show{opacity:1;}
.bingo-card{background:rgba(0,8,25,0.88);border:1px solid rgba(0,212,255,0.25);backdrop-filter:blur(6px);padding:0.5rem;width:170px;}
.bingo-hdr{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:3px;text-align:center;color:#00d4ff;margin-bottom:0.35rem;text-transform:uppercase;}
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.bingo-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(0,20,50,0.7);border:1px solid rgba(0,100,180,0.15);font-family:'Cinzel',serif;font-size:0.68rem;color:rgba(255,255,255,0.4);transition:all 0.3s;position:relative;}
.bingo-cell.daubed{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.5);color:#00ffd4;font-weight:700;}
.bingo-cell.daubed::after{content:'';position:absolute;inset:2px;border:1px solid rgba(0,255,212,0.4);border-radius:50%;animation:daubPulse 1.5s ease-in-out;}
@keyframes daubPulse{0%{transform:scale(0);opacity:1;}100%{transform:scale(1.8);opacity:0;}}
.bingo-cell.bingo-hit{background:rgba(255,215,0,0.2)!important;border-color:rgba(255,215,0,0.6)!important;color:#ffd700!important;animation:bingoGlow 0.6s ease infinite alternate;}
@keyframes bingoGlow{0%{box-shadow:inset 0 0 8px rgba(255,215,0,0.2);}100%{box-shadow:inset 0 0 16px rgba(255,215,0,0.5);}}
.bingo-free{font-size:0.5rem;letter-spacing:1px;color:rgba(0,212,255,0.6);}
.bingo-pattern{font-size:0.5rem;letter-spacing:2px;color:rgba(255,255,255,0.3);text-align:center;margin-top:0.35rem;text-transform:uppercase;}
.bingo-pattern strong{color:#00ffd4;}
.bingo-progress{height:3px;background:rgba(0,100,180,0.2);margin-top:0.25rem;overflow:hidden;}
.bingo-progress-bar{height:100%;background:linear-gradient(90deg,#00d4ff,#00ffd4);width:0%;transition:width 0.5s;}

/* ── MODE TABS ── */
#modeTabs{pointer-events:all;display:flex;gap:0.3rem;padding:0 1rem;margin-top:0.35rem;}
.mode-tab{flex:1;padding:0.3rem;text-align:center;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);cursor:pointer;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);transition:all 0.2s;}
.mode-tab.active{border-color:rgba(0,212,255,0.4);color:#00d4ff;background:rgba(0,212,255,0.06);}
.mode-tab:hover{border-color:rgba(0,212,255,0.25);color:rgba(0,212,255,0.7);}

#midSpace{flex:1;}

/* Win text */
#winText{text-align:center;pointer-events:none;min-height:2rem;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:3px;opacity:0;transition:opacity 0.3s;}
#winText.show{opacity:1;}
#winText.win{color:#00ffd4;text-shadow:0 0 20px rgba(0,255,212,0.5);}
#winText.lose{color:rgba(255,255,255,0.25);}
#winText.bingo{color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.6);font-size:1.4rem;}

/* Controls */
#controls{pointer-events:all;padding:0.5rem 1rem max(0.5rem,env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(0,8,20,0.92) 0%,transparent 100%);}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:0.6rem;margin-bottom:0.4rem;}
#freeBadge{display:none;padding:0.2rem 0.6rem;border:1px solid rgba(0,255,170,0.4);background:rgba(0,255,170,0.06);font-size:0.65rem;letter-spacing:2px;color:#00ffd4;text-transform:uppercase;}
#freeBadge.on{display:flex;gap:0.3rem;align-items:center;animation:freePulse 1.5s ease-in-out infinite alternate;}
@keyframes freePulse{0%{box-shadow:none;}100%{box-shadow:0 0 12px rgba(0,255,170,0.3);}}
.bet-group{display:flex;align-items:center;gap:0.4rem;}
.bet-lbl{font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.bet-arrow{width:28px;height:28px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bet-arrow:hover{border-color:rgba(0,212,255,0.4);color:#00d4ff;}
#betDisplay{min-width:48px;text-align:center;font-family:'Cinzel',serif;font-size:0.95rem;color:#00ffd4;letter-spacing:1px;}
.preset-row{display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;}
.preset{padding:0.2rem 0.55rem;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.35);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;transition:all 0.2s;}
.preset:hover,.preset.active{border-color:rgba(0,212,255,0.4);color:#00d4ff;background:rgba(0,212,255,0.05);}
#spinBtn{width:100%;max-width:340px;margin:0 auto;display:block;padding:0.75rem;border:2px solid rgba(0,212,255,0.5);background:linear-gradient(135deg,rgba(0,20,60,0.9),rgba(0,40,80,0.9));color:#00ffd4;font-family:'Cinzel',serif;font-size:1.05rem;font-weight:900;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
#spinBtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(0,212,255,0.08) 50%,transparent 60%);transform:translateX(-100%);transition:transform 0.4s;}
#spinBtn:hover::before{transform:translateX(100%);}
#spinBtn:active{transform:scale(0.97);}
#spinBtn:disabled{opacity:0.35;cursor:not-allowed;}
#spinBtn:disabled::before{display:none;}

/* Big win overlay */
#bigWinOverlay{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
#bigWinOverlay.show{display:flex;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.bw-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,20,50,0.95),rgba(0,5,15,0.98));}
.bw-rays{position:absolute;inset:0;background:conic-gradient(from 0deg,transparent,rgba(0,212,255,0.04),transparent,rgba(255,215,0,0.04),transparent);animation:raysSpin 12s linear infinite;}
@keyframes raysSpin{to{transform:rotate(360deg);}}
.bw-content{position:relative;text-align:center;z-index:2;}
.bw-label{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:5px;color:rgba(0,212,255,0.6);text-transform:uppercase;margin-bottom:0.5rem;}
.bw-type{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#00d4ff,#00ffd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(0,212,255,0.5));}
.bw-type.jackpot{background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(255,215,0,0.7));}
.bw-type.bingo-win{background:linear-gradient(135deg,#ffd700,#00ffd4,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.bw-amount{font-family:'Cinzel',serif;font-size:3.5rem;font-weight:900;color:#fff;margin-top:0.5rem;letter-spacing:3px;filter:drop-shadow(0 0 20px rgba(255,255,255,0.3));}
.bw-amount.jackpot{color:#ffd700;text-shadow:0 0 60px rgba(255,215,0,0.9);}
.bw-tap{font-size:0.65rem;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-top:1.5rem;animation:tapBlink 1.3s ease-in-out infinite;}
@keyframes tapBlink{0%,100%{opacity:0.2}50%{opacity:0.8}}
#bwCanvas{position:absolute;inset:0;pointer-events:none;}

/* Free spins intro */
#freeIntro{position:fixed;inset:0;z-index:99;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,5,20,0.95);cursor:pointer;text-align:center;}
#freeIntro.show{display:flex;animation:fadeIn 0.4s ease;}
.fi-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;letter-spacing:5px;color:#00ffd4;text-shadow:0 0 30px rgba(0,255,212,0.6);}
.fi-count{font-family:'Cinzel',serif;font-size:5rem;font-weight:900;color:#fff;line-height:1;}
.fi-sub{font-size:0.8rem;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:0.5rem;}
.fi-tap{font-size:0.65rem;letter-spacing:4px;color:rgba(255,255,255,0.25);margin-top:2rem;animation:tapBlink 1.3s ease-in-out infinite;}

/* BINGO WIN OVERLAY */
#bingoWinOverlay{position:fixed;inset:0;z-index:95;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,5,15,0.92);}
#bingoWinOverlay.show{display:flex;animation:fadeIn 0.4s ease;}
.bingo-win-title{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(255,215,0,0.6));animation:bingoTitlePulse 1s ease infinite alternate;}
@keyframes bingoTitlePulse{0%{transform:scale(1);}100%{transform:scale(1.05);}}
.bingo-win-pattern{font-size:0.8rem;letter-spacing:4px;color:rgba(0,255,212,0.7);text-transform:uppercase;margin:0.8rem 0;}
.bingo-win-amount{font-family:'Cinzel',serif;font-size:3rem;font-weight:900;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,0.5);}

@media(max-width:600px){
  #bingoCardWrap{position:fixed;right:auto;left:50%;top:auto;bottom:calc(env(safe-area-inset-bottom) + 170px);transform:translateX(-50%);width:92%;}
  .bingo-card{width:100%;}
  .bingo-grid{gap:1px;}
  .bingo-cell{font-size:0.6rem;}
}
@media(min-width:601px) and (max-width:900px){
  #bingoCardWrap{right:0.5rem;width:150px;}
}

/* XP Popup */
.xp-float{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:#00FFCC;text-shadow:0 0 12px rgba(0,255,204,0.5);pointer-events:none;z-index:200;opacity:0;animation:xpFloatUp 1.2s ease-out forwards;}
@keyframes xpFloatUp{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}20%{opacity:1;transform:translate(-50%,-60%) scale(1.1);}100%{opacity:0;transform:translate(-50%,-120%) scale(0.8);}}
.levelup-overlay{position:fixed;inset:0;z-index:250;background:rgba(5,5,16,0.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.levelup-overlay.show{opacity:1;pointer-events:auto;}
.levelup-box{text-align:center;animation:levelPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes levelPop{0%{transform:scale(0);}100%{transform:scale(1);}}
.levelup-box .lu-stars{font-size:2rem;margin-bottom:0.3rem;}
.levelup-box .lu-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;background:linear-gradient(135deg,#00FFCC,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.levelup-box .lu-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:#00FFCC;line-height:1;text-shadow:0 0 30px rgba(0,255,204,0.4);}
.levelup-box .lu-title{font-size:1rem;letter-spacing:2px;color:#FFD700;text-transform:uppercase;margin:0.2rem 0;}
.levelup-box .lu-reward{font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:0.3rem;}
</style>

const sfx={};
function initSounds(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const tone=(freq,dur,type='sine',vol=0.1,delay=0)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur);
  };
  sfx.spin=()=>{tone(80,0.25,'sawtooth',0.06);};
  sfx.tick=(f=440)=>{tone(f,0.05,'triangle',0.05);};
  sfx.stop=(i)=>{tone(200+i*80,0.12,'sine',0.1);};
  sfx.win=(big)=>{const n=big?[523,659,784,1047]:[523,659,784];n.forEach((f,i)=>tone(f,0.35,'sine',0.13,i*0.12));};
  sfx.jackpot=()=>{[262,330,392,523,659,784,1047,1319].forEach((f,i)=>tone(f,0.45,'sine',0.16,i*0.1));};
  sfx.coin=()=>{tone(1200+Math.random()*400,0.08,'sine',0.04);};
  sfx.btn=()=>{tone(880,0.08,'sine',0.05);};
  sfx.daub=()=>{tone(600,0.1,'triangle',0.08);tone(900,0.08,'sine',0.06,0.05);};
  sfx.bingo=()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>{tone(f,0.4,'sine',0.15,i*0.1);tone(f*0.5,0.3,'triangle',0.06,i*0.1);});};
  sfx.bubble=()=>{tone(800+Math.random()*600,0.15,'sine',0.02);};
}

function buildSymbolTexture(id,W,H){
  const cfg=SYM_CFG[id];const gfx=new PIXI.Graphics();
  // BG
  gfx.roundRect(2,2,W-4,H-4,8);gfx.fill({color:cfg.bg[0]});
  gfx.roundRect(2,2,W-4,(H-4)*0.45,8);gfx.fill({color:cfg.bg[1],alpha:0.7});
  // Animated water caustics pattern
  for(let i=0;i<3;i++){
    const cx=W*0.2+i*(W*0.3), cy=H*0.3+Math.sin(i)*H*0.15;
    gfx.circle(cx,cy,W*0.15);gfx.fill({color:cfg.glow,alpha:0.06});
  }
  // Border
  gfx.roundRect(2,2,W-4,H-4,8);gfx.stroke({color:cfg.glow,alpha:cfg.glowA*0.6,width:1.5});
  gfx.roundRect(4,4,W-8,H-8,6);gfx.stroke({color:cfg.glow,alpha:cfg.glowA*0.25,width:1});

    gfx.circle(W/2-3,H*0.34,W*0.04);gfx.fill({color:0xffffff,alpha:0.7});
    // Shell
    gfx.moveTo(W*0.2,H*0.55);gfx.bezierCurveTo(W*0.3,H*0.7,W*0.7,H*0.7,W*0.8,H*0.55);
    gfx.stroke({color:0x6688aa,alpha:0.5,width:2});
  }else if(id==='SHARK'){
    gfx.moveTo(W*0.2,H*0.55);gfx.lineTo(W*0.5,H*0.25);gfx.lineTo(W*0.8,H*0.55);
    gfx.fill({color:0x6644aa,alpha:0.5});
    gfx.circle(W*0.4,H*0.48,3);gfx.fill({color:0xffffff,alpha:0.8});
    gfx.moveTo(W*0.55,H*0.56);gfx.lineTo(W*0.78,H*0.42);gfx.stroke({color:0x8866cc,alpha:0.4,width:2});
  }else if(id==='TURTLE'){
    gfx.circle(W/2,H*0.42,W*0.2);gfx.fill({color:0x006644,alpha:0.5});
    gfx.circle(W/2,H*0.42,W*0.14);gfx.fill({color:0x008855,alpha:0.6});
    gfx.circle(W/2,H*0.3,W*0.06);gfx.fill({color:0x009966,alpha:0.7});
  }else if(id==='JELLYFISH'){
    gfx.ellipse(W/2,H*0.35,W*0.2,H*0.15);gfx.fill({color:0xaa44dd,alpha:0.5});
    for(let t=0;t<4;t++){
      const tx=W*0.3+t*(W*0.12);
      gfx.moveTo(tx,H*0.5);gfx.bezierCurveTo(tx-5,H*0.65,tx+5,H*0.7,tx,H*0.8);
      gfx.stroke({color:0xcc66ff,alpha:0.3,width:1.5});
    }
  }else if(id==='SEAHORSE'){
    gfx.moveTo(W*0.5,H*0.2);gfx.bezierCurveTo(W*0.7,H*0.3,W*0.65,H*0.5,W*0.5,H*0.55);
    gfx.bezierCurveTo(W*0.35,H*0.6,W*0.4,H*0.75,W*0.5,H*0.8);
    gfx.stroke({color:0x66cc22,alpha:0.6,width:2.5});
  }else if(id==='SHELL'){
    gfx.moveTo(W*0.2,H*0.6);gfx.bezierCurveTo(W*0.35,H*0.25,W*0.65,H*0.25,W*0.8,H*0.6);
    gfx.fill({color:0xcc8833,alpha:0.4});
    for(let r=0;r<3;r++){gfx.moveTo(W*(0.3+r*0.15),H*0.58);gfx.lineTo(W*0.5,H*0.3);gfx.stroke({color:0xddaa55,alpha:0.2,width:1});}
  }else if(id==='STARFISH'){
    const cx=W/2,cy=H*0.45;
    for(let p=0;p<5;p++){
      const a=(p/5)*Math.PI*2-Math.PI/2;
      gfx.moveTo(cx,cy);gfx.lineTo(cx+Math.cos(a)*W*0.22,cy+Math.sin(a)*H*0.22);

    gfx.circle(cx,cy,4);gfx.fill({color:0xff8899,alpha:0.6});

    for(let b=0;b<4;b++){
      const bx=W*0.2+b*(W*0.2);

function getReelArea(){
  const sw=app.screen.width,sh=app.screen.height;
  const ctrlH=document.getElementById('controls').offsetHeight;
  const topH=document.getElementById('topBar').offsetHeight+document.getElementById('jpBanner').offsetHeight+document.getElementById('modeTabs').offsetHeight+18;
  const winH=40;const padX=Math.min(16,sw*0.03);
  // In bingo mode, leave room for bingo card on desktop
  const rightPad=gameMode==='bingo'&&sw>600?180:0;
  return{x:padX,y:topH,w:sw-padX*2-rightPad,h:sh-topH-ctrlH-winH-8};
}
function getSymW(){const r=getReelArea();return Math.floor((r.w-(COLS-1)*4)/COLS);}
function getSymH(){const r=getReelArea();return Math.floor(r.h/ROWS);}

let bgGfx,frameGfx,vigTop,vigBot,reelMask;
function buildScene(){
  bgGfx=new PIXI.Graphics();app.stage.addChild(bgGfx);
  reelContainer=new PIXI.Container();app.stage.addChild(reelContainer);
  // Create mask — must be sibling, not child of masked container
  reelMask=new PIXI.Graphics();app.stage.addChild(reelMask);
  reelContainer.mask=reelMask;
  for(let col=0;col<COLS;col++){
    reelStrips.push(buildStrip());reelPositions.push(0);reelTargets.push(0);reelSpinning.push(false);reelSprites.push([]);symbolTextObjects.push([]);glowSprites.push([]);
  }
  buildAllTextures();buildReelSprites();
  lineGfx=new PIXI.Graphics();app.stage.addChild(lineGfx);
  frameGfx=new PIXI.Graphics();app.stage.addChild(frameGfx);
  vigTop=new PIXI.Graphics();vigBot=new PIXI.Graphics();
  app.stage.addChild(vigTop);app.stage.addChild(vigBot);
  coinEmitter=new PIXI.Container();app.stage.addChild(coinEmitter);
  drawLayout();
}

function buildStrip(){
  const strip=[];
  const weights=[3,4,5,6,7,9,9,10,3,2];
  for(let i=0;i<STRIP_LEN;i++){
    const total=weights.reduce((a,b)=>a+b,0);let r=Math.random()*total;
    for(let j=0;j<SYM_IDS.length;j++){r-=weights[j];if(r<=0){strip.push(SYM_IDS[j]);break;}}
    if(strip.length<=i)strip.push('CORAL');
  }
  return strip;
}

function buildReelSprites(){
  reelSprites.forEach(col=>col.forEach(s=>s.destroy()));
  reelSprites=[];symbolTextObjects.forEach(col=>col.forEach(t=>t.destroy()));symbolTextObjects=[];
  glowSprites.forEach(col=>col.forEach(g=>g.destroy()));glowSprites=[];
  const W=getSymW(),H=getSymH(),area=getReelArea();
  for(let col=0;col<COLS;col++){
    reelSprites[col]=[];symbolTextObjects[col]=[];glowSprites[col]=[];
    for(let row=0;row<ROWS+2;row++){
      const idx=(Math.floor(reelPositions[col])+row-1+STRIP_LEN)%STRIP_LEN;
      const symId=reelStrips[col][idx];
      const tex=symTextures[symId]||symTextures.CORAL;
      const spr=new PIXI.Sprite(tex);
      spr.x=area.x+col*(W+4);spr.y=area.y+(row-1)*H;
      spr.width=W-3;spr.height=H-3;
      reelContainer.addChild(spr);reelSprites[col].push(spr);
      const txt=new PIXI.Text({text:SYM_CFG[symId]?.label||'?',style:{fontFamily:'Rajdhani,sans-serif',fontSize:Math.max(10,Math.min(16,H*0.16)),fontWeight:'700',fill:SYM_CFG[symId]?.glow||0xffffff,letterSpacing:2,align:'center'}});
      txt.anchor.set(0.5);txt.x=spr.x+spr.width/2;txt.y=spr.y+spr.height*0.78;
      reelContainer.addChild(txt);symbolTextObjects[col].push(txt);
      const glw=new PIXI.Graphics();glw.roundRect(spr.x-1,spr.y-1,spr.width+2,spr.height+2,8);
      glw.stroke({color:SYM_CFG[symId]?.glow||0xffffff,alpha:0,width:2});
      reelContainer.addChild(glw);glowSprites[col].push(glw);
    }
  }
}

function drawLayout(){
  if(!app)return;const sw=app.screen.width,sh=app.screen.height;const area=getReelArea();const W=getSymW(),H=getSymH();
  // Background - deep ocean gradient
  bgGfx.clear();
  bgGfx.rect(0,0,sw,sh);bgGfx.fill({color:0x020b1a});
  // Ocean depth bands
  for(let y=0;y<5;y++){
    const yp=sh*y/5;bgGfx.rect(0,yp,sw,sh/5);
    bgGfx.fill({color:[0x021020,0x021428,0x010c1e,0x010818,0x000612][y],alpha:0.5});
  }
  // Subtle caustic light beams
  for(let i=0;i<6;i++){
    const bx=sw*(0.1+i*0.16),bw=sw*0.08;
    bgGfx.moveTo(bx,0);bgGfx.lineTo(bx+bw*0.8,sh);bgGfx.lineTo(bx-bw*0.2,sh);bgGfx.lineTo(bx-bw*0.5,0);
    bgGfx.fill({color:0x0088cc,alpha:0.015});
  }
  // Mask — clips reel sprites to visible area only
  reelMask.clear();
  reelMask.rect(area.x-2,area.y,COLS*(W+4)+4,ROWS*H);
  reelMask.fill({color:0xffffff});

  // Frame
  frameGfx.clear();
  frameGfx.roundRect(area.x-2,area.y-2,COLS*(W+4)+1,ROWS*H+4,6);
  frameGfx.stroke({color:0x006699,alpha:0.4,width:1.5});
  // Reel separators
  for(let c=1;c<COLS;c++){
    frameGfx.moveTo(area.x+c*(W+4)-2,area.y);frameGfx.lineTo(area.x+c*(W+4)-2,area.y+ROWS*H);
    frameGfx.stroke({color:0x004466,alpha:0.2,width:1});
  }
  // Vignettes
  vigTop.clear();vigTop.rect(area.x,area.y-H*0.3,COLS*(W+4),H*0.3);vigTop.fill({color:0x020b1a,alpha:0.95});
  vigBot.clear();vigBot.rect(area.x,area.y+ROWS*H,COLS*(W+4),H*0.3);vigBot.fill({color:0x020b1a,alpha:0.95});
}

// ═══════════════════════════════════════════════════════════════════════════════
// GAME LOOP — reel physics + animations
// ═══════════════════════════════════════════════════════════════════════════════
const spinPhase=Array(COLS).fill('idle');
const spinVelocities=Array(COLS).fill(0);
const ACCEL=0.8, MAX_SPEED=28, BRAKE=1.2;

function gameLoop(ticker){
  const dt=ticker.deltaTime;const area=getReelArea();const W=getSymW(),H=getSymH();
  bgAnimTime+=dt*0.01;
  for(let col=0;col<COLS;col++){
    if(spinPhase[col]==='idle')continue;
    if(spinPhase[col]==='accel'){spinVelocities[col]=Math.min(MAX_SPEED,spinVelocities[col]+ACCEL*dt);}
    else if(spinPhase[col]==='cruise'){spinVelocities[col]+=(MAX_SPEED-spinVelocities[col])*0.1*dt;}
    else if(spinPhase[col]==='brake'){
      spinVelocities[col]=Math.max(0,spinVelocities[col]-BRAKE*dt);
      if(spinVelocities[col]<=0.1){
        reelPositions[col]=reelTargets[col];spinPhase[col]='idle';spinVelocities[col]=0;
        sfx.stop&&sfx.stop(col);
        // DON'T continue — fall through to update sprites at final position
      }
    }
    if(spinPhase[col]!=='idle'){
      reelPositions[col]=(reelPositions[col]+spinVelocities[col]*dt*0.05)%STRIP_LEN;
      if(spinPhase[col]!=='idle'){
        const sym=reelStrips[col][Math.floor(reelPositions[col])%STRIP_LEN];
        if(Math.random()<0.1*dt)sfx.tick&&sfx.tick(300+col*60);
      }
    }
    // Update sprites
    const baseIdx=Math.floor(reelPositions[col]);const frac=reelPositions[col]-baseIdx;
    for(let row=0;row<ROWS+2;row++){
      const idx=(baseIdx+row-1+STRIP_LEN*100)%STRIP_LEN;
      const symId=reelStrips[col][idx];
      const spr=reelSprites[col][row];const txt=symbolTextObjects[col][row];
      if(spr&&symTextures[symId]){
        spr.texture=symTextures[symId];spr.x=area.x+col*(W+4);spr.y=area.y+(row-1-frac)*H;spr.width=W-3;spr.height=H-3;
      }
      if(txt){
        txt.text=SYM_CFG[symId]?.label||'?';txt.style.fill=SYM_CFG[symId]?.glow||0xffffff;
        txt.x=area.x+col*(W+4)+(W-3)/2;txt.y=area.y+(row-1-frac)*H+(H-3)*0.78;
      }
    }
  }
  // Check if all reels just stopped this frame
  if(spinPhase.every(p=>p==='idle')&&spinning)onAllStopped();
}

// ═══════════════════════════════════════════════════════════════════════════════
// BUBBLE PARTICLES
// ═══════════════════════════════════════════════════════════════════════════════
function bubbleLoop(ticker){
  const dt=ticker.deltaTime;
  // Spawn occasional ambient bubbles
  if(Math.random()<0.03*dt){
    const gfx=new PIXI.Graphics();const r=2+Math.random()*4;
    gfx.circle(0,0,r);gfx.fill({color:0x44aaff,alpha:0.15});
    gfx.circle(-r*0.2,-r*0.2,r*0.3);gfx.fill({color:0xffffff,alpha:0.1});
    gfx.x=Math.random()*app.screen.width;gfx.y=app.screen.height+10;
    app.stage.addChild(gfx);
    bubbleParticles.push({gfx,vy:-0.5-Math.random()*1.5,vx:(Math.random()-0.5)*0.3,wobble:Math.random()*6.28,wobbleSpeed:0.02+Math.random()*0.03});
  }
  for(let i=bubbleParticles.length-1;i>=0;i--){
    const b=bubbleParticles[i];b.gfx.y+=b.vy*dt;b.wobble+=b.wobbleSpeed*dt;b.gfx.x+=Math.sin(b.wobble)*0.3;
    b.gfx.alpha=Math.min(0.15,b.gfx.alpha);
    if(b.gfx.y<-20){b.gfx.destroy();bubbleParticles.splice(i,1);}
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// SPIN
// ═══════════════════════════════════════════════════════════════════════════════
async function doSpin(){
  if(spinning)return;sfx.btn&&sfx.btn();
  if(freeLeft>0){isFree=true;}else{isFree=false;if(bal<bet){showWinText('Insufficient credits','lose');return;}}
  spinning=true;pendingResult=null;clearLines();showWinText('','');
  document.getElementById('spinBtn').disabled=true;
  for(let col=0;col<COLS;col++){spinPhase[col]='accel';spinVelocities[col]=0;}
  sfx.spin&&sfx.spin();
  try{
    const res=await fetch('/api/game/spin-ocean',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bet,mode:gameMode,bingoCard:gameMode==='bingo'?bingoCard:undefined,bingoDaubed:gameMode==='bingo'?bingoDaubed:undefined,bingoPattern:currentBingoTarget})});
    const data=await res.json();
    if(!res.ok){showWinText(data.error||'Error','lose');stopAllReels(null);return;}
    bal=data.credits;updateBal();
    if(data.xp) showXPGain(data.xp);
    if(data.jackpots)updateJP(data.jackpots);
    if(isFree){freeLeft--;updateFree();}
    pendingResult=data;
    for(let col=0;col<COLS;col++){spinPhase[col]='cruise';}
    setTimeout(()=>{stopAllReels(data.grid);},600);
  }catch(e){console.error(e);stopAllReels(null);}
}

function stopAllReels(grid){
  for(let col=0;col<COLS;col++){
    setTimeout(()=>{if(grid)plantResult(col,grid[col]);spinPhase[col]='brake';},col*COL_DELAY);
  }
  setTimeout(()=>{if(spinning&&pendingResult){for(let col=0;col<COLS;col++){if(spinPhase[col]!=='idle'){reelPositions[col]=reelTargets[col];spinPhase[col]='idle';}}}},SPIN_MS+2000);
}

function plantResult(col,colResult){
  const mid=colResult[1];let best=-1,bestD=9999;
  for(let i=0;i<STRIP_LEN;i++){
    if(reelStrips[col][i]===mid){let d=(i-Math.floor(reelPositions[col])+STRIP_LEN*100)%STRIP_LEN;if(d<4)d+=STRIP_LEN;if(d<bestD){bestD=d;best=i;}}
  }
  if(best===-1){best=(Math.floor(reelPositions[col])+8)%STRIP_LEN;reelStrips[col][best]=mid;}
  reelStrips[col][(best-1+STRIP_LEN)%STRIP_LEN]=colResult[0];
  reelStrips[col][(best+1)%STRIP_LEN]=colResult[2];
  reelTargets[col]=(best-1+STRIP_LEN)%STRIP_LEN;
}

function onAllStopped(){
  if(!pendingResult){endSpin();return;}
  const data=pendingResult;pendingResult=null;
  setTimeout(()=>{
    // Bingo mode — daub matching numbers
    if(gameMode==='bingo'&&data.bingoDaubs){
      processBingoDaubs(data.bingoDaubs);
      bingoSpinsUsed++;
    }
    if(data.bingoWin){
      setTimeout(()=>{showBingoWin(data.bingoWin);},data.win>0?2500:400);
    }
    if(data.jackpot){
      sfx.jackpot&&sfx.jackpot();spawnCoins(120);
      showBigWin('jackpot',data.jackpot.type.toUpperCase()+' JACKPOT',data.win);
    }else if(data.win>0){
      const winLines=calcWinLines(data.grid,data.win);drawWinLines(winLines);
      const mult=data.win/bet;
      if(mult>=50){sfx.win&&sfx.win(true);spawnCoins(80);showBigWin('big',mult>=100?'MEGA WIN':'BIG WIN',data.win);}
      else if(mult>=15){sfx.win&&sfx.win(true);spawnCoins(40);showBigWin('super','SUPER WIN',data.win);}
      else{sfx.win&&sfx.win(false);spawnCoins(12);showWinText(`WIN  +$${(data.win/100).toFixed(2)}`,'win');}
      if(isFree)freeTotalWin+=data.win;
    }else{
      const sc=data.scatters||0;
      if(sc>=3){
        const cnt=sc===5?25:sc===4?15:10;freeLeft=cnt;freeTotalWin=0;updateFree();showFreeIntro(cnt);return;
      }else{showWinText('No Win','lose');}
    }
    if(freeLeft===0&&freeTotalWin>0){
      const totalWon=freeTotalWin;freeTotalWin=0;
      setTimeout(()=>{sfx.jackpot&&sfx.jackpot();spawnCoins(100);showBigWin('free','FREE GAMES TOTAL',totalWon);},500);return;
    }
    endSpin();
    if(freeLeft>0)setTimeout(doSpin,800);
  },300);
}

function endSpin(){spinning=false;isFree=false;document.getElementById('spinBtn').disabled=false;document.getElementById('spinBtn').textContent=freeLeft>0?`FREE (${freeLeft})`:'SPIN';}

// WIN LINES
// ═══════════════════════════════════════════════════════════════════════════════
function calcWinLines(grid,totalWin){
  if(!grid||totalWin<=0)return[];const lines=[];
  PAYLINES.forEach((line,li)=>{
    const syms=line.map((row,col)=>grid[col][row]);
    const first=syms[0]==='WILD'?(syms.find(s=>s!=='WILD')||'WILD'):syms[0];
    if(first==='SCATTER')return;let streak=0;
    for(const s of syms){if(s===first||s==='WILD')streak++;else break;}
    if(streak>=3)lines.push(li);
  });return lines;
}

let lineAnimTimer=null;
function drawWinLines(lineIndices){
  clearLines();if(!lineIndices.length)return;
  const area=getReelArea(),W=getSymW(),H=getSymH();
  const animate=()=>{
    const t=performance.now()*0.003;const alpha=0.5+0.5*Math.sin(t*3);
    lineGfx.clear();
    lineIndices.forEach(li=>{
      const line=PAYLINES[li];const col=LINE_COLORS[li%LINE_COLORS.length];
      const points=line.map((row,c)=>({x:area.x+c*(W+4)+(W-3)/2,y:area.y+row*H+H/2}));
      line.forEach((row,c)=>{lineGfx.roundRect(area.x+c*(W+4)+1,area.y+row*H+1,W-5,H-5,6);lineGfx.fill({color:col,alpha:alpha*0.18});lineGfx.roundRect(area.x+c*(W+4)+1,area.y+row*H+1,W-5,H-5,6);lineGfx.stroke({color:col,alpha:alpha*0.7,width:2});});
      lineGfx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)lineGfx.lineTo(points[i].x,points[i].y);
      lineGfx.stroke({color:col,alpha:alpha,width:3});
      points.forEach(p=>{lineGfx.circle(p.x,p.y,5);lineGfx.fill({color:col,alpha:alpha});});
    });
    lineAnimTimer=requestAnimationFrame(animate);
  };animate();
}
function clearLines(){if(lineAnimTimer){cancelAnimationFrame(lineAnimTimer);lineAnimTimer=null;}lineGfx&&lineGfx.clear();}

const activeCoins=[];
function spawnCoins(count){
  const cx=app.screen.width/2,cy=app.screen.height*0.45;
  for(let i=0;i<count;i++){setTimeout(()=>{
    const gfx=new PIXI.Graphics();const r=5+Math.random()*5;
    gfx.circle(0,0,r);gfx.fill({color:Math.random()>0.5?0x00ddff:0x00ffaa});
    gfx.circle(0,0,r-1.5);gfx.stroke({color:0xaaffee,alpha:0.6,width:1});
    gfx.x=cx+(Math.random()-0.5)*app.screen.width*0.45;gfx.y=cy;
    coinEmitter.addChild(gfx);
    activeCoins.push({gfx,vx:(Math.random()-0.5)*8,vy:-6-Math.random()*10,ay:0.35+Math.random()*0.2,rot:(Math.random()-0.5)*0.3,life:1});
    sfx.coin&&Math.random()<0.4&&sfx.coin();
  },i*20);}
}
function coinLoop(){
  for(let i=activeCoins.length-1;i>=0;i--){
    const c=activeCoins[i];c.vy+=c.ay;c.gfx.x+=c.vx;c.gfx.y+=c.vy;c.gfx.rotation+=c.rot;c.life-=0.015;c.gfx.alpha=Math.min(1,c.life*3);
    if(c.life<=0||c.gfx.y>app.screen.height+50){c.gfx.destroy();activeCoins.splice(i,1);}
  }
}

function startBWConfetti(canvasId){

}

// ═══════════════════════════════════════════════════════════════════════════════
// BINGO SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function generateBingoCard(){
  bingoCard=[];bingoDaubed=[];bingoSpinsUsed=0;
  // 5x5 grid, numbers 1-40, each column draws from a range
  const ranges=[[1,8],[9,16],[17,24],[25,32],[33,40]];
  for(let col=0;col<5;col++){
    const [lo,hi]=ranges[col];const pool=[];
    for(let n=lo;n<=hi;n++)pool.push(n);
    pool.sort(()=>Math.random()-0.5);
    for(let row=0;row<5;row++){
      if(row===2&&col===2){bingoCard.push(0);bingoDaubed.push(true);}// FREE space
      else{bingoCard.push(pool[row]);bingoDaubed.push(false);}
    }
  }
  // Pick random pattern target
  const patternKeys=Object.keys(BINGO_PATTERNS);
  currentBingoTarget=patternKeys[Math.floor(Math.random()*patternKeys.length)];
  renderBingoCard();
}

function renderBingoCard(){
  const wrap=document.getElementById('bingoCardWrap');
  const card=document.getElementById('bingoCard');
  const pat=BINGO_PATTERNS[currentBingoTarget];
  const daubedCount=bingoDaubed.filter(d=>d).length;
  const progress=Math.min(100,Math.round((daubedCount/25)*100));
  let html=`<div class="bingo-hdr">🌊 Bingo Card</div><div class="bingo-grid">`;
  for(let i=0;i<25;i++){
    const val=bingoCard[i];const daubed=bingoDaubed[i];
    const isFreeSpace=val===0;
    const cls=daubed?'bingo-cell daubed':'bingo-cell';
    html+=`<div class="${cls}">${isFreeSpace?'<span class="bingo-free">FREE</span>':val}</div>`;
  }
  html+=`</div><div class="bingo-pattern">Target: <strong>${pat.name}</strong> (${pat.mult}×)</div>`;
  html+=`<div class="bingo-progress"><div class="bingo-progress-bar" style="width:${progress}%"></div></div>`;
  html+=`<div style="font-size:0.5rem;color:rgba(255,255,255,0.25);text-align:center;margin-top:0.2rem">Spins: ${bingoSpinsUsed}/${BINGO_MAX_SPINS}</div>`;
  card.innerHTML=html;
}

function processBingoDaubs(daubs){
  if(!daubs||!daubs.length)return;
  daubs.forEach((num,i)=>{
    setTimeout(()=>{
      const idx=bingoCard.indexOf(num);
      if(idx!==-1&&!bingoDaubed[idx]){
        bingoDaubed[idx]=true;sfx.daub&&sfx.daub();
        // Spawn bubble at daub location
        spawnBubbleBurst();
      }
      renderBingoCard();
    },i*200);
  });
}

function spawnBubbleBurst(){
  for(let i=0;i<8;i++){
    const gfx=new PIXI.Graphics();const r=2+Math.random()*3;
    gfx.circle(0,0,r);gfx.fill({color:0x00ccff,alpha:0.3});
    gfx.x=app.screen.width*0.8+Math.random()*60-30;gfx.y=app.screen.height*0.5+Math.random()*40-20;
    app.stage.addChild(gfx);
    bubbleParticles.push({gfx,vy:-2-Math.random()*3,vx:(Math.random()-0.5)*2,wobble:Math.random()*6.28,wobbleSpeed:0.05});
    sfx.bubble&&sfx.bubble();
  }
}

// Bingo pattern checkers (5x5 grid stored row-major: index = col*5 + row)
function getCell(col,row){return bingoDaubed[col*5+row];}
function checkLine(){
  for(let r=0;r<5;r++){if([0,1,2,3,4].every(c=>getCell(c,r)))return true;}
  for(let c=0;c<5;c++){if([0,1,2,3,4].every(r=>getCell(c,r)))return true;}
  return false;
}
function checkCorners(){return getCell(0,0)&&getCell(4,0)&&getCell(0,4)&&getCell(4,4);}
function checkDiagonal(){return([0,1,2,3,4].every(i=>getCell(i,i))||[0,1,2,3,4].every(i=>getCell(i,4-i)));}
function checkXPattern(){return[0,1,2,3,4].every(i=>getCell(i,i))&&[0,1,2,3,4].every(i=>getCell(i,4-i));}
function checkFullCard(){return bingoDaubed.every(d=>d);}

function showBingoWin(bingoData){
  sfx.bingo&&sfx.bingo();spawnCoins(60);
  const ov=document.getElementById('bingoWinOverlay');
  document.getElementById('bingoWinPattern').textContent=bingoData.pattern;
  document.getElementById('bingoWinAmount').textContent=`$${(bingoData.amount/100).toFixed(2)}`;
  ov.classList.add('show');startBWConfetti('bingoWinCanvas');
  // Highlight winning cells
  document.querySelectorAll('.bingo-cell.daubed').forEach(c=>c.classList.add('bingo-hit'));
}
function closeBingoWin(){
  document.getElementById('bingoWinOverlay').classList.remove('show');

  // Generate new bingo card for next round

function showWinText(msg,cls){const el=document.getElementById('winText');el.textContent=msg;el.className='show '+(cls||'');if(!msg)el.className='';}
function updateBal(){document.getElementById('balDisplay').textContent='$'+(bal/100).toFixed(2);}
function updateBet(){document.getElementById('betDisplay').textContent='$'+(bet/100).toFixed(2);}
function stepBet(dir){
  const steps=[10,25,50,100,200,500,1000,2500,5000,10000];
  let i=steps.findIndex(s=>s>=bet);if(i<0)i=steps.length-1;
  i=Math.max(0,Math.min(steps.length-1,i+dir));
  bet=Math.max(minBet,Math.min(maxBet,steps[i]));updateBet();sfx.btn&&sfx.btn();
}
function setBet(v){bet=Math.max(minBet,Math.min(maxBet,v));updateBet();}
function setBetVal(v){setBet(v);sfx.btn&&sfx.btn();}
function updateFree(){
  const badge=document.getElementById('freeBadge');
  if(freeLeft>0){badge.classList.add('on');document.getElementById('freeLeft').textContent=freeLeft;document.getElementById('spinBtn').textContent=`FREE (${freeLeft})`;}
  else{badge.classList.remove('on');document.getElementById('spinBtn').textContent='SPIN';}
}
function updateJP(jp){
  document.getElementById('jpMini').textContent='$'+(jp.mini/100).toFixed(2);
  document.getElementById('jpMajor').textContent='$'+(jp.major/100).toFixed(2);
  document.getElementById('jpGrand').textContent='$'+(jp.grand/100).toFixed(2);
