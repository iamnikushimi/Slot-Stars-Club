<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — Slot Stars Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --neon: #00FFCC;
    --red: #FF4455;
    --dark: #050510;
    --dark2: #0a0a1f;
    --dark3: #0f0f2e;
    --border: rgba(255,215,0,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,165,0,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 100%, rgba(0,255,204,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(5,5,16,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .user-info { display: flex; align-items: center; gap: 1.5rem; }
  .credits-display {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 1rem;
    border: 1px solid var(--gold);
    background: rgba(255,215,0,0.05);
  }
  .credits-label { font-size: 0.7rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .credits-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold); }
  .username-badge { font-size: 0.9rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
  .panel-btn {
    display: none;
    padding: 0.3rem 0.9rem;
    border: 1px solid var(--neon);
    background: rgba(0,255,204,0.06);
    color: var(--neon);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s;
  }
  .panel-btn:hover { background: rgba(0,255,204,0.15); }
  .logout-btn {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4); padding: 0.3rem 0.8rem;
    cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
    position: relative; z-index: 5;
  }

  .machine {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    width: 100%; max-width: 520px;
    padding: 2rem;
    box-shadow: 0 0 60px rgba(255,165,0,0.1), inset 0 1px 0 rgba(255,215,0,0.1);
  }
  .machine-title {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 4px;
    color: var(--gold); margin-bottom: 1.5rem;
    opacity: 0.6;
  }

  .reels {
    display: flex; gap: 0.75rem;
    margin-bottom: 1.5rem;
    background: rgba(0,0,0,0.4);
    padding: 1.5rem;
    border: 1px solid rgba(255,215,0,0.1);
  }
  .reel {
    flex: 1; height: 100px;
    background: var(--dark3);
    border: 1px solid rgba(255,215,0,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    position: relative; overflow: hidden;
    transition: transform 0.1s;
  }
  .reel.spinning {
    animation: reelSpin 0.1s linear infinite;
  }
  @keyframes reelSpin {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
  }
  .reel-inner { transition: all 0.3s; }

  /* Win line */
  .win-line {
    position: relative;
    text-align: center; height: 2px;
    background: transparent;
    margin: -0.75rem 0 0.75rem;
    transition: background 0.3s;
  }
  .win-line.active { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  /* Result banner */
  .result-banner {
    text-align: center; min-height: 3rem;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 4px;
    opacity: 0; transition: opacity 0.3s;
  }
  .result-banner.show { opacity: 1; }
  .result-banner.win { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .result-banner.lose { color: rgba(255,255,255,0.3); font-size: 1rem; letter-spacing: 2px; }
  .result-banner.jackpot { color: var(--neon); font-size: 2.5rem; text-shadow: 0 0 30px rgba(0,255,204,0.6); animation: jackpotPulse 0.5s infinite alternate; }
  @keyframes jackpotPulse { from { transform: scale(1); } to { transform: scale(1.05); } }

  /* Bet controls */
  .bet-section {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .bet-label { font-size: 0.75rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; flex: 0; white-space: nowrap; }
  .bet-controls { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
  .bet-btn {
    width: 32px; height: 32px;
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    cursor: pointer; font-size: 1.2rem;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .bet-btn:hover { border-color: var(--gold); color: var(--gold); }
  .bet-display {
    flex: 1; text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--gold);
    background: var(--dark3);
    border: 1px solid rgba(255,215,0,0.15);
    padding: 0.2rem 0;
  }
  .bet-presets { display: flex; gap: 0.4rem; }
  .bet-preset {
    padding: 0.2rem 0.5rem;
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    cursor: pointer; font-size: 0.75rem; font-family: 'Rajdhani', sans-serif;
    transition: all 0.2s;
  }
  .bet-preset:hover { border-color: var(--gold); color: var(--gold); }

  .spin-btn {
    width: 100%;
    padding: 1.2rem;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(255,165,0,0.2);
    position: relative; overflow: hidden;
  }
  .spin-btn:not(:disabled):hover {
    box-shadow: 0 0 50px rgba(255,165,0,0.4);
    transform: translateY(-1px);
  }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .spin-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .spin-btn:not(:disabled):hover::after { transform: translateX(100%); }

  /* Payout table */
  .payout-table {
    margin-top: 1.5rem;
    border: 1px solid rgba(255,215,0,0.1);
    background: rgba(0,0,0,0.2);
  }
  .payout-title {
    padding: 0.6rem 1rem;
    font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    border-bottom: 1px solid rgba(255,215,0,0.1);
  }
  .payout-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .payout-row:last-child { border-bottom: none; }
  .payout-combo { font-size: 1.1rem; letter-spacing: 2px; }
  .payout-mult {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--gold);
  }
  .payout-row.jackpot .payout-mult { color: var(--neon); }

  /* History */
  .history-section { margin-top: 1.5rem; width: 100%; max-width: 520px; }
  .history-title {
    font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 0.75rem;
  }
  .history-list { display: flex; flex-direction: column; gap: 0.3rem; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 0.75rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
  }
  .h-reels { letter-spacing: 4px; }
  .h-result { font-weight: 700; }
  .h-result.win { color: var(--gold); }
  .h-result.lose { color: rgba(255,255,255,0.3); }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    nav { padding: 0.75rem 1rem; }
    .user-info { gap: 0.6rem; }
    .username-badge { display: none; }
    .panel-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; letter-spacing: 0; }
    .credits-display { padding: 0.35rem 0.6rem; }
    .credits-label { display: none; }
    .credits-value { font-size: 1.1rem; }
    .logout-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; }

    main { padding: 1rem 0.75rem; justify-content: flex-start; }

    .machine { padding: 1rem; }
    .machine-title { font-size: 1rem; letter-spacing: 2px; margin-bottom: 1rem; }

    .reels { padding: 0.75rem; gap: 0.5rem; margin-bottom: 1rem; }
    .reel { height: 76px; font-size: 2.6rem; }

    .result-banner { font-size: 1.3rem; letter-spacing: 2px; min-height: 2.2rem; margin-bottom: 1rem; }
    .result-banner.jackpot { font-size: 1.6rem; }
    .result-banner.lose { font-size: 0.85rem; }

    .bet-section { gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .bet-label { font-size: 0.65rem; letter-spacing: 1px; }
    .bet-btn { width: 38px; height: 38px; font-size: 1.3rem; }
    .bet-display { font-size: 1.3rem; }
    .bet-presets { gap: 0.3rem; }
    .bet-preset { padding: 0.3rem 0.5rem; font-size: 0.8rem; min-width: 36px; }

    .spin-btn { font-size: 1.5rem; letter-spacing: 2px; padding: 1rem; }

    .payout-table { margin-top: 1rem; }
    .payout-title { font-size: 0.65rem; padding: 0.5rem 0.75rem; }
    .payout-row { padding: 0.35rem 0.75rem; }
    .payout-combo { font-size: 0.95rem; letter-spacing: 1px; }
    .payout-mult { font-size: 0.9rem; }

    .history-section { margin-top: 1rem; }
    .history-title { font-size: 0.65rem; }
    .history-item { padding: 0.4rem 0.6rem; font-size: 0.85rem; }
    .h-reels { letter-spacing: 2px; }
  }
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">★ SSC</a>
  <div class="user-info">
    <span class="username-badge" id="username">—</span>
    <a class="panel-btn" id="panelBtn" href="#">Panel</a>
    <div class="credits-display">
      <span class="credits-label">Credits</span>
      <span class="credits-value" id="credits">—</span>
    </div>
    <button class="logout-btn" onclick="logout()">Exit</button>
  </div>
</nav>

<main>
  <div class="machine">
    <div class="machine-title">✦ Slot Machine ✦</div>

    <div class="reels" id="reels">
      <div class="reel" id="r0"><div class="reel-inner" id="ri0">⭐</div></div>
      <div class="reel" id="r1"><div class="reel-inner" id="ri1">⭐</div></div>
      <div class="reel" id="r2"><div class="reel-inner" id="ri2">⭐</div></div>
    </div>
    <div class="win-line" id="winLine"></div>

    <div class="result-banner" id="resultBanner">—</div>

    <div class="bet-section">
      <span class="bet-label">Bet</span>
      <div class="bet-controls">
        <button class="bet-btn" onclick="changeBet(-1)">−</button>
        <div class="bet-display" id="betDisplay">1</div>
        <button class="bet-btn" onclick="changeBet(1)">+</button>
      </div>
      <div class="bet-presets">
        <button class="bet-preset" onclick="setBet(1)">1</button>
        <button class="bet-preset" onclick="setBet(5)">5</button>
        <button class="bet-preset" onclick="setBet(10)">10</button>
        <button class="bet-preset" onclick="setBet(25)">25</button>
      </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>

    <div class="payout-table">
      <div class="payout-title">Payout Table</div>
      <div class="payout-row jackpot"><span class="payout-combo">7️⃣ 7️⃣ 7️⃣</span><span class="payout-mult">50× BET</span></div>
      <div class="payout-row jackpot"><span class="payout-combo">💎 💎 💎</span><span class="payout-mult">25× BET</span></div>
      <div class="payout-row"><span class="payout-combo">⭐ ⭐ ⭐</span><span class="payout-mult">15× BET</span></div>
      <div class="payout-row"><span class="payout-combo">🍒 🍒 🍒</span><span class="payout-mult">10× BET</span></div>
      <div class="payout-row"><span class="payout-combo">🍋 🍋 🍋</span><span class="payout-mult">8× BET</span></div>
      <div class="payout-row"><span class="payout-combo">Any 2 Match</span><span class="payout-mult">2× BET</span></div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-title">Recent Spins</div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<script>
let bet = 1;
let credits = 0;
let spinning = false;
const SYMBOLS = ['🍒','🍋','⭐','💎','7️⃣'];

// Load user
async function loadUser() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location = '/'; return; }
  const data = await res.json();
  credits = data.credits;
  document.getElementById('username').textContent = data.username;
  document.getElementById('credits').textContent = credits;
  // Show panel button for admin/reseller
  if (data.role === 'admin' || data.role === 'reseller') {
    const btn = document.getElementById('panelBtn');
    btn.style.display = 'inline-block';
    btn.href = data.role === 'admin' ? '/admin' : '/reseller';
    btn.textContent = data.role === 'admin' ? '⬡ Admin' : '◈ Reseller';
  }
}
loadUser();

function changeBet(delta) {
  bet = Math.max(1, Math.min(bet + delta, Math.min(100, credits)));
  document.getElementById('betDisplay').textContent = bet;
}
function setBet(val) {
  bet = Math.min(val, Math.max(1, credits));
  document.getElementById('betDisplay').textContent = bet;
}

async function spin() {
  if (spinning || credits < bet) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;

  // Reset result
  const banner = document.getElementById('resultBanner');
  banner.className = 'result-banner';
  banner.textContent = '';
  document.getElementById('winLine').classList.remove('active');

  // Start spinning animation
  [0,1,2].forEach(i => document.getElementById('r'+i).classList.add('spinning'));

  // Randomize display while spinning
  let spinInterval = setInterval(() => {
    [0,1,2].forEach(i => {
      document.getElementById('ri'+i).textContent = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
    });
  }, 80);

  try {
    const res = await fetch('/api/game/spin', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({bet})
    });
    const data = await res.json();

    // Stop after delay
    await new Promise(r => setTimeout(r, 800));
    clearInterval(spinInterval);

    // Stop spinning - show result
    [0,1,2].forEach((i, idx) => {
      setTimeout(() => {
        document.getElementById('r'+i).classList.remove('spinning');
        document.getElementById('ri'+i).textContent = data.reels[i];
        if (idx === 2) showResult(data);
      }, idx * 150);
    });

    credits = data.credits;
    document.getElementById('credits').textContent = credits;

    // Add to history
    addHistory(data.reels, data.win, bet);

  } catch(e) {
    clearInterval(spinInterval);
    [0,1,2].forEach(i => document.getElementById('r'+i).classList.remove('spinning'));
  }

  spinning = false;
  btn.disabled = false;
}

function showResult(data) {
  const banner = document.getElementById('resultBanner');
  const winLine = document.getElementById('winLine');

  setTimeout(() => {
    if (data.win > 0) {
      const isJackpot = data.reels[0] === data.reels[1] && data.reels[1] === data.reels[2] && data.win > bet * 5;
      banner.className = 'result-banner show ' + (isJackpot ? 'jackpot' : 'win');
      banner.textContent = isJackpot ? `🎰 JACKPOT! +${data.win} 🎰` : `WIN +${data.win} CREDITS`;
      winLine.classList.add('active');
    } else {
      banner.className = 'result-banner show lose';
      banner.textContent = 'No win — Try again';
    }
  }, 450);
}

let history = [];
function addHistory(reels, win, b) {
  history.unshift({reels, win, bet: b});
  if (history.length > 8) history.pop();
  renderHistory();
}
function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="h-reels">${h.reels.join(' ')}</span>
      <span class="h-result ${h.win > 0 ? 'win' : 'lose'}">${h.win > 0 ? '+'+h.win : '−'+h.bet}</span>
    </div>
  `).join('');
}

async function logout() {
  await fetch('/api/auth/logout', {method: 'POST'});
  window.location = '/';
}

// Keyboard space to spin
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !spinning) { e.preventDefault(); spin(); }
});
</script>
</body>
</html>
