<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<title>Pull Tab — Slot Stars Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#FFD700;--gold2:#FFA500;--pink:#ff99cc;--neon:#00FFCC;--red:#FF4455;--dark:#050510;--dark2:#0a0a1f;--dark3:#0f0f2e;--border:rgba(255,153,204,0.2);--muted:rgba(255,255,255,0.4);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,153,204,0.05),transparent 60%);pointer-events:none;}

  nav{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.5rem;padding-top:max(0.9rem,env(safe-area-inset-top));border-bottom:1px solid var(--border);background:rgba(5,5,16,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
  .nav-right{display:flex;align-items:center;gap:0.75rem;}
  .back-btn{padding:0.3rem 0.8rem;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all 0.2s;}
  .back-btn:hover{border-color:#fff;color:#fff;}
  .credits-pill{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.8rem;border:1px solid var(--pink);background:rgba(255,153,204,0.06);}
  .credits-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--pink);}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:0.3rem 0.7rem;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem;gap:1.5rem;}

  .ticket{background:linear-gradient(145deg,#1a0a1f,#0f0a1a);border:2px solid var(--border);width:100%;max-width:380px;padding:1.5rem;position:relative;box-shadow:0 0 40px rgba(255,153,204,0.08);}
  .ticket::before,.ticket::after{content:'';position:absolute;left:50%;transform:translateX(-50%);width:20px;height:20px;background:var(--dark);border-radius:50%;border:2px solid var(--border);}
  .ticket::before{top:-11px;}
  .ticket::after{bottom:-11px;}

  .ticket-header{text-align:center;margin-bottom:1.5rem;}
  .ticket-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:5px;color:var(--pink);}
  .ticket-sub{font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}

  .windows{display:flex;gap:1rem;justify-content:center;margin-bottom:1.5rem;}
  .window{width:80px;height:80px;background:var(--dark3);border:2px solid rgba(255,153,204,0.15);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden;cursor:pointer;transition:all 0.3s;}
  .window::before{content:'PULL';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a0a2e,#0f0620);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--pink);z-index:1;transition:all 0.4s;border:1px solid rgba(255,153,204,0.2);}
  .window.revealed::before{transform:translateY(-120%);opacity:0;}
  .window.revealed{border-color:rgba(255,153,204,0.3);background:rgba(255,153,204,0.04);}
  .window.match{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.3);animation:matchPulse 0.5s ease;}
  @keyframes matchPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

  .result-area{text-align:center;min-height:3rem;}
  .result-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;}
  .result-text.win{color:var(--gold);}
  .result-text.lose{color:var(--muted);font-size:1rem;}
  .result-text.jackpot{color:var(--neon);font-size:2rem;animation:glow 0.5s infinite alternate;}
  @keyframes glow{from{text-shadow:none;}to{text-shadow:0 0 20px rgba(0,255,204,0.6);}}

  .divider{width:80%;height:1px;background:repeating-linear-gradient(90deg,rgba(255,153,204,0.2) 0,rgba(255,153,204,0.2) 5px,transparent 5px,transparent 10px);}

  .bet-section{width:100%;max-width:380px;display:flex;flex-direction:column;gap:0.75rem;}
  .bet-row{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
  .bet-label{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .bet-controls{display:flex;align-items:center;gap:0.4rem;}
  .bet-btn{width:32px;height:32px;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .bet-btn:hover{border-color:var(--pink);color:var(--pink);}
  .bet-display{min-width:70px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--pink);background:var(--dark3);border:1px solid rgba(255,153,204,0.15);padding:0.15rem 0.5rem;}
  .presets{display:flex;gap:0.4rem;flex-wrap:wrap;}
  .preset{padding:0.2rem 0.5rem;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);cursor:pointer;font-size:0.7rem;font-family:'Rajdhani',sans-serif;transition:all 0.2s;}
  .preset:hover{border-color:var(--pink);color:var(--pink);}

  .pull-btn{width:100%;max-width:380px;padding:1.1rem;background:linear-gradient(135deg,var(--pink),var(--gold));color:var(--dark);border:none;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(255,153,204,0.15);}
  .pull-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,153,204,0.3);}
  .pull-btn:disabled{opacity:0.4;cursor:not-allowed;}

  .payout-grid{width:100%;max-width:380px;display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:0.75rem;}
  .pt-row{display:flex;justify-content:space-between;padding:0.3rem 0.5rem;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);}
  .pt-combo{color:var(--muted);}
  .pt-mult{color:var(--pink);font-weight:700;}

  @media(max-width:480px){
    nav{padding:0.75rem 1rem;}
    .window{width:70px;height:70px;font-size:2.2rem;}
  }
</style>
</head>
<body>
<nav>
  <a class="logo" href="/play">★ SSC</a>
  <div class="nav-right">
    <a class="back-btn" href="/play">← Lobby</a>
    <div class="credits-pill"><span class="credits-val" id="credits">—</span></div>
    <button class="logout-btn" onclick="logout()">Exit</button>
  </div>
</nav>

<main>
  <div class="ticket">
    <div class="ticket-header">
      <div class="ticket-title">🎟️ Pull Tab</div>
      <div class="ticket-sub">Pull to reveal — Match to win</div>
    </div>
    <div class="windows" id="windows">
      <div class="window" id="w0"></div>
      <div class="window" id="w1"></div>
      <div class="window" id="w2"></div>
    </div>
    <div class="divider"></div>
    <div class="result-area" style="margin-top:1rem">
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <div class="bet-section">
    <div class="bet-row">
      <span class="bet-label">Ticket Price</span>
      <div class="bet-controls">
        <button class="bet-btn" onclick="changeBet(-1)">−</button>
        <div class="bet-display" id="betDisplay">$0.10</div>
        <button class="bet-btn" onclick="changeBet(1)">+</button>
      </div>
      <div class="presets">
        <button class="preset" onclick="setBet(10)">$0.10</button>
        <button class="preset" onclick="setBet(50)">$0.50</button>
        <button class="preset" onclick="setBet(100)">$1</button>
        <button class="preset" onclick="setBet(500)">$5</button>
      </div>
    </div>
  </div>

  <button class="pull-btn" id="pullBtn" onclick="pull()">🎟️ Buy & Pull</button>

  <div class="payout-grid">
    <div class="pt-row"><span class="pt-combo">💰💰💰</span><span class="pt-mult">100×</span></div>
    <div class="pt-row"><span class="pt-combo">7️⃣7️⃣7️⃣</span><span class="pt-mult">50×</span></div>
    <div class="pt-row"><span class="pt-combo">💎💎💎</span><span class="pt-mult">25×</span></div>
    <div class="pt-row"><span class="pt-combo">🍀🍀🍀</span><span class="pt-mult">15×</span></div>
    <div class="pt-row"><span class="pt-combo">⭐⭐⭐</span><span class="pt-mult">10×</span></div>
    <div class="pt-row"><span class="pt-combo">🔔🔔🔔</span><span class="pt-mult">8×</span></div>
    <div class="pt-row"><span class="pt-combo">🎁🎁🎁</span><span class="pt-mult">5×</span></div>
    <div class="pt-row"><span class="pt-combo">💰💰 any</span><span class="pt-mult">3×</span></div>
  </div>
</main>

<script>
let betCents=10,minBet=10,maxBet=10000,credits=0;
let pulling=false;

async function loadUser(){
  const res=await fetch('/api/me');if(!res.ok){window.location='/';return;}
  const d=await res.json();credits=d.credits;
  document.getElementById('credits').textContent='$'+(credits/100).toFixed(2);
}
async function loadSettings(){const r=await fetch('/api/game/settings');const d=await r.json();minBet=d.minBet;maxBet=d.maxBet;betCents=minBet;updateBet();}
function updateBet(){document.getElementById('betDisplay').textContent='$'+(betCents/100).toFixed(2);}
function changeBet(dir){
  const steps=[10,25,50,100,200,500,1000,2500,5000,10000];
  let idx=steps.findIndex(s=>s>=betCents);if(idx===-1)idx=steps.length-1;
  if(dir>0)idx=Math.min(steps.length-1,idx+1);else idx=Math.max(0,idx-1);
  betCents=Math.max(minBet,Math.min(maxBet,steps[idx]));updateBet();
}
function setBet(c){betCents=Math.max(minBet,Math.min(maxBet,c));updateBet();}

function resetTicket(){
  for(let i=0;i<3;i++){
    const w=document.getElementById('w'+i);
    w.textContent='';w.className='window';
  }
  document.getElementById('resultText').textContent='';
  document.getElementById('resultText').className='result-text';
}

async function pull(){
  if(pulling||credits<betCents){return;}
  pulling=true;
  document.getElementById('pullBtn').disabled=true;
  resetTicket();

  const res=await fetch('/api/game/pulltab/pull',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bet:betCents})});
  const d=await res.json();
  if(!res.ok){alert(d.error||'Error');pulling=false;document.getElementById('pullBtn').disabled=false;return;}
  credits=d.credits;
  document.getElementById('credits').textContent='$'+(credits/100).toFixed(2);

  // Reveal tabs one by one
  const isMatch=d.multiplier>0;
  for(let i=0;i<3;i++){
    await new Promise(r=>setTimeout(r,350));
    const w=document.getElementById('w'+i);
    w.textContent=d.tabs[i];
    w.classList.add('revealed');
    if(isMatch&&i<2&&d.tabs[i]===d.tabs[0]) w.classList.add('match');
    if(isMatch&&i===2&&(d.tabs[2]===d.tabs[0]||d.tabs[1]===d.tabs[2])) w.classList.add('match');
  }

  await new Promise(r=>setTimeout(r,300));
  const rt=document.getElementById('resultText');
  if(d.win>0){
    const big=d.multiplier>=50;
    rt.textContent=big?`💰 JACKPOT! +$${(d.win/100).toFixed(2)} 💰`:`WIN ${d.multiplier}× — +$${(d.win/100).toFixed(2)}`;
    rt.className='result-text '+(big?'jackpot':'win');
  } else {
    rt.textContent='No match — try again';
    rt.className='result-text lose';
  }

  pulling=false;
  document.getElementById('pullBtn').disabled=false;
}

async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location='/';}
loadUser();loadSettings();
</script>
</body>
</html>
